<!-- Theme Selector Component -->
<div id="theme-selector" class="theme-selector">
          <button id="theme-toggle" class="theme-toggle">
          🎨 <span id="current-theme">Theme</span>
        </button>
  
  <div id="theme-dropdown" class="theme-dropdown">
    <button class="theme-option" data-theme="jekyll-minima">
      <span class="label-full">Minima Theme</span><span class="label-short">Minima</span>
    </button>
    <button class="theme-option" data-theme="retro-game">
      <span class="label-full">Retro-Game FF7</span><span class="label-short">FF7</span>
    </button>
  </div>
</div>
